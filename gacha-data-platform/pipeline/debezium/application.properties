# ============================================================
# Debezium Server — Husbando Chronicles CDC configuration
#
# Streams Postgres WAL changes → Pub/Sub (emulator or real GCP).
# The PUBSUB_EMULATOR_HOST env var in docker-compose.yml routes
# the Pub/Sub sink to the local emulator automatically.
# ============================================================

# ── Sink: Google Cloud Pub/Sub ────────────────────────────────
debezium.sink.type=pubsub
debezium.sink.pubsub.project.id=gacha-local
# Ordering keys ensure per-table ordering (important for CDC correctness).
debezium.sink.pubsub.ordering.enabled=true
# The Pub/Sub client library honours PUBSUB_EMULATOR_HOST when set;
# this address is the fallback for environments without that env var.
debezium.sink.pubsub.address=pubsub-emulator:8085

# ── Source: PostgreSQL ────────────────────────────────────────
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector

# Offset storage — persisted in the mounted volume so restarts resume
# from the last committed WAL position.
debezium.source.offset.storage=org.apache.kafka.connect.storage.FileOffsetBackingStore
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=5000

# Database connection
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=gacha
debezium.source.database.password=gacha_local
debezium.source.database.dbname=husbando_chronicles

# Logical replication slot + publication
debezium.source.slot.name=debezium_gacha
debezium.source.plugin.name=pgoutput
debezium.source.publication.name=dbz_publication

# Topic prefix — Debezium publishes to "<prefix>.<schema>.<table>"
# e.g. gacha.public.pulls
debezium.source.topic.prefix=gacha

# Only CDC the tables the pipeline cares about.
debezium.source.table.include.list=public.pulls,public.transactions,public.players,public.player_pity,public.player_inventory

# ── Topic routing ────────────────────────────────────────────
# Route ALL table changes to a single topic for simplified pipeline consumption.
# The source_table field in the CDC payload still identifies which table changed.
debezium.transforms=reroute
debezium.transforms.reroute.type=io.debezium.transforms.ByLogicalTableRouter
debezium.transforms.reroute.topic.regex=gacha\\.public\\.(.*)
debezium.transforms.reroute.topic.replacement=gacha-cdc-all

# ── Data type handling ────────────────────────────────────────
# Debezium encodes NUMERIC/DECIMAL as base64 by default ("precise" mode).
# Switch to "double" so downstream JSON parsing works with plain numbers.
debezium.source.decimal.handling.mode=double

# ── Snapshot behaviour ────────────────────────────────────────
# "initial" → take a full snapshot on first start, then stream changes.
# Change to "never" after first run if you don't need historical data.
debezium.source.snapshot.mode=initial

# ── Heartbeat ────────────────────────────────────────────────
# Disabled for local — Pub/Sub emulator rejects the heartbeat topic name
# (__debezium-heartbeat.gacha has invalid characters).
# Enable for production with real Pub/Sub.
# debezium.source.heartbeat.interval.ms=30000
