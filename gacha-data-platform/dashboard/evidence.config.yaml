appearance:
  default: light
  switcher: true

theme:
  colorPalettes:
    default:
      light:
        - "#f4b548"  # SSR gold
        - "#a855f7"  # SR purple
        - "#60a5fa"  # R blue
        - "#f472b6"  # pink accent
        - "#34d399"  # teal
        - "#fb923c"  # orange
        - "#c084fc"  # lavender
        - "#38bdf8"  # sky
        - "#fbbf24"  # amber
        - "#4ade80"  # green
      dark:
        - "#f4b548"
        - "#a855f7"
        - "#60a5fa"
        - "#f472b6"
        - "#34d399"
        - "#fb923c"
        - "#c084fc"
        - "#38bdf8"
        - "#fbbf24"
        - "#4ade80"
  colorScales:
    default:
      light:
        - "#ede9fe"  # soft lavender
        - "#7c3aed"  # deep purple
      dark:
        - "#c4b5fd"
        - "#7c3aed"
  colors:
    primary:
      light: "#7c3aed"  # gacha purple
      dark: "#a78bfa"
    accent:
      light: "#f4b548"  # SSR gold
      dark: "#fbbf24"
    base:
      light: "#faf5ff"  # soft purple-white bg
      dark: "#1a1025"   # deep purple-black
    info:
      light: "#6366f1"  # indigo
      dark: "#818cf8"
    positive:
      light: "#10b981"  # emerald (lucky!)
      dark: "#34d399"
    warning:
      light: "#f4b548"  # gold
      dark: "#fbbf24"
    negative:
      light: "#ef4444"  # red (unlucky)
      dark: "#f87171"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages. 
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }
