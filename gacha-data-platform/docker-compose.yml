services:

  # ── Source Database ────────────────────────────────────────────────────────
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: husbando_chronicles
      POSTGRES_USER: gacha
      POSTGRES_PASSWORD: gacha_local
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./seed/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    command:
      - "postgres"
      - "-c"
      - "wal_level=logical"
      - "-c"
      - "max_replication_slots=4"
      - "-c"
      - "max_wal_senders=4"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gacha -d husbando_chronicles"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Pub/Sub Emulator ───────────────────────────────────────────────────────
  pubsub-emulator:
    image: google/cloud-sdk:latest
    command: >
      gcloud beta emulators pubsub start
      --host-port=0.0.0.0:8085
      --project=gacha-local
    ports:
      - "8085:8085"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8085"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Pub/Sub Init (topics + subscriptions) ──────────────────────────────────
  pubsub-init:
    image: curlimages/curl:latest
    volumes:
      - ./scripts/init-pubsub.sh:/init-pubsub.sh
    entrypoint: ["/bin/sh", "/init-pubsub.sh"]
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    depends_on:
      pubsub-emulator:
        condition: service_healthy

  # ── CDC: Debezium Server ───────────────────────────────────────────────────
  # Streams Postgres WAL → Pub/Sub emulator.
  # Publishes to per-table topics: gacha.public.pulls, gacha.public.transactions, etc.
  debezium-server:
    image: debezium/server:2.5
    ports:
      - "8080:8080"
    volumes:
      - ./pipeline/debezium:/debezium/conf
      - debezium_offsets:/debezium/data
    environment:
      PUBSUB_EMULATOR_HOST: pubsub-emulator:8085
    depends_on:
      postgres:
        condition: service_healthy
      pubsub-init:
        condition: service_completed_successfully

  # ── Observability: Langfuse ────────────────────────────────────────────────
  # Langfuse is only needed for the chat/LLM layer (not built yet).
  # When ready, run with: docker compose --profile observability up
  langfuse:
    image: langfuse/langfuse:latest
    profiles: ["observability"]
    environment:
      DATABASE_URL: postgresql://gacha:gacha_local@postgres:5432/langfuse
      NEXTAUTH_SECRET: local-secret-change-me
      NEXTAUTH_URL: http://localhost:3000
      SALT: local-salt-change-me
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  debezium_offsets:
